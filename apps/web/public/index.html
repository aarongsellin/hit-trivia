<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="<%= BASE_URL %>favicon.svg" />
    <link rel="alternate icon" href="<%= BASE_URL %>favicon.svg" />
    <title>Hit Trivia - The Music Guessing Game</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Listen to short music clips, guess the song, and compete with friends in real-time. Free multiplayer music trivia — no app download needed."
    />
    <meta name="theme-color" content="#8b5cf6" />

    <!-- Open Graph (Facebook, LinkedIn, Discord, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Hit Trivia — The Music Guessing Game" />
    <meta
      property="og:description"
      content="Listen to short music clips, guess the song, and compete with friends in real-time. Free multiplayer music trivia."
    />
    <meta property="og:image" content="<%= BASE_URL %>og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Hit Trivia — Listen. Guess. Compete with friends."
    />
    <meta property="og:site_name" content="Hit Trivia" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hit Trivia — The Music Guessing Game" />
    <meta
      name="twitter:description"
      content="Listen to short music clips, guess the song, and compete with friends in real-time."
    />
    <meta name="twitter:image" content="<%= BASE_URL %>og-image.png" />
    <meta
      name="twitter:image:alt"
      content="Hit Trivia — Listen. Guess. Compete with friends."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <noscript>
      <strong
        >We're sorry but Hit Trivia doesn't work properly without JavaScript
        enabled. Please enable it to continue.</strong
      >
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
