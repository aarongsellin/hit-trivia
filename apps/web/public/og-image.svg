<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%" r="35%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative music notes (subtle) -->
  <g opacity="0.08" fill="#a78bfa">
    <text x="100" y="150" font-size="80" font-family="serif">♪</text>
    <text x="950" y="200" font-size="60" font-family="serif">♫</text>
    <text x="200" y="520" font-size="50" font-family="serif">♩</text>
    <text x="1050" y="480" font-size="70" font-family="serif">♬</text>
    <text x="500" y="100" font-size="40" font-family="serif">♪</text>
    <text x="800" y="560" font-size="55" font-family="serif">♫</text>
  </g>

  <!-- Logo icon -->
  <g transform="translate(540, 160)">
    <circle cx="60" cy="50" r="48" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>
    <g stroke="#a78bfa" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(36, 26)">
      <path d="M9 18V5l12-2v13"/>
      <circle cx="6" cy="18" r="3" fill="#a78bfa"/>
      <circle cx="18" cy="16" r="3" fill="#a78bfa"/>
    </g>
  </g>

  <!-- Title -->
  <text x="600" y="310" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="72" fill="white" letter-spacing="-1">
    Hit Trivia
  </text>

  <!-- Accent line -->
  <rect x="500" y="335" width="200" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="600" y="390" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="500" font-size="28" fill="#a78bfa" opacity="0.9">
    The Music Guessing Game
  </text>

  <!-- Description -->
  <text x="600" y="440" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="400" font-size="20" fill="#9ca3af">
    Listen. Guess. Compete with friends.
  </text>

  <!-- CTA pill -->
  <rect x="490" y="475" width="220" height="44" rx="22" fill="url(#accent)" opacity="0.15"/>
  <rect x="490" y="475" width="220" height="44" rx="22" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
  <text x="600" y="503" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="600" font-size="16" fill="#a78bfa">
    Play Now — It's Free
  </text>
</svg>
