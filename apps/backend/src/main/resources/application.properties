server.port=8080

# Trust proxy headers (Railway terminates SSL at their edge proxy)
server.forward-headers-strategy=native

# Activate 'local' profile by default (loads application-local.properties)
# On Railway, set SPRING_PROFILES_ACTIVE=production (or any non-local value)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Apple Music MusicKit
# Locally: values come from application-local.properties
# Railway: set env vars APPLE_MUSIC_TEAM_ID, APPLE_MUSIC_KEY_ID, APPLE_MUSIC_PRIVATE_KEY
apple.music.team-id=
apple.music.key-id=
apple.music.private-key=
logging.level.root=INFO
logging.level.com.hittrivia=DEBUG