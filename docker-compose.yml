version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hit-trivia-db
    environment:
      POSTGRES_USER: hittrivia
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hit_trivia
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hittrivia']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
